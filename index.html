<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>小班课物料需求管理系统（云端版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, sans-serif;
        }
        body { background: #f0f4f9; padding: 1.5rem; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #1a3c34 0%, #0f2c25 100%);
            color: white; padding: 2rem; border-radius: 2rem; margin-bottom: 2rem;
        }
        .header h1 { font-size: 2rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .sub { margin-top: 0.8rem; opacity: 0.85; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: white; border-radius: 1.5rem; padding: 1.2rem; border: 1px solid #e9edf2; }
        .stat-number { font-size: 2.2rem; font-weight: 700; color: #1e4a3b; }
        .stat-label { color: #5f6c7a; font-size: 0.85rem; margin-top: 0.5rem; }
        .analysis-card { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid #eef2f6; }
        .analysis-tab-bar { display: flex; gap: 0.6rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
        .analysis-tab { padding: 0.4rem 1rem; border-radius: 2rem; border: 1px solid #cfdee9; background: #fff; cursor: pointer; }
        .analysis-tab.active { background: #1e4a3b; color: white; }
        .chart-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2rem; margin-bottom: 1rem; }
        @media (max-width: 1200px) { .chart-grid { grid-template-columns: repeat(2,1fr); } }
        @media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } }
        .chart-box { min-height: 320px; display: flex; flex-direction: column; align-items: center; }
        canvas { max-width: 100%; }
        .analysis-summary { background: #f8fafc; padding: 1rem; border-radius: 1rem; border-left: 4px solid #1e4a3b; white-space: pre-line; font-size: 0.85rem; }
        .two-col { display: grid; grid-template-columns: 1fr 1.5fr; gap: 1.5rem; margin-bottom: 2rem; }
        @media (max-width: 780px) { .two-col { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #eef2f6; }
        .card h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; color: #1f2a3a; }
        .form-group { margin-bottom: 1rem; }
        label { font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.3rem; color: #2c3e4e; }
        select, input, textarea { width: 100%; padding: 0.7rem; border-radius: 1rem; border: 1px solid #cfdee9; font-size: 0.9rem; }
        button { background: #1e4a3b; color: white; border: none; padding: 0.7rem 1.2rem; border-radius: 2rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0f3529; transform: translateY(-1px); }
        .preview-block { background: #f8fafc; padding: 1rem; border-radius: 1rem; margin-top: 1rem; border-left: 4px solid #1e4a3b; }
        .filter-bar { display: flex; gap: 0.8rem; margin-bottom: 1.2rem; flex-wrap: wrap; align-items: center; }
        .filter-select, .filter-input-date, .filter-input-key { padding: 0.4rem 1rem; border-radius: 2rem; border: 1px solid #cfdee9; }
        .task-item { background: #fefefe; border-bottom: 1px solid #edf2f7; padding: 1rem 0; display: flex; justify-content: space-between; align-items: center; gap: 0.8rem; flex-wrap: wrap; cursor: pointer; }
        .task-item:hover { background: #f8fafc; }
        .task-info { flex: 2; }
        .task-title { font-weight: 600; margin-bottom: 0.2rem; }
        .task-meta { display: flex; gap: 0.6rem; flex-wrap: wrap; font-size: 0.7rem; }
        .task-category, .task-person { background: #eef2ff; padding: 0.2rem 0.6rem; border-radius: 40px; }
        .task-date { color: #64748b; }
        .task-status { display: flex; gap: 0.5rem; }
        .status-btn { background: none; padding: 0.3rem 0.8rem; border-radius: 40px; border: 1px solid #cfdee9; color: #4a5b6e; }
        .status-btn.done { background: #e0f2e9; border-color: #1e4a3b; color: #1e4a3b; }
        .del-btn, .edit-btn, .detail-btn { background: none; border: 1px solid #cfdee9; }
        .modal-mask { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 999; display: none; }
        .modal-box { width: min(700px,90vw); background: #fff; border-radius: 1.5rem; padding: 1.8rem; max-height: 90vh; overflow-y: auto; }
        .img-preview { max-width: 100%; max-height: 240px; border-radius: 0.5rem; margin-top: 0.5rem; display: none; }
        .footer-note { text-align: center; font-size: 0.75rem; color: #8a99aa; margin-top: 2rem; }
        .clear-input-btn { background: #64748b; margin-top: 0.5rem; }
        .add-task-btn { margin-top: 0.5rem; }
        .export-btn { margin-top: 0.5rem; background: #346c9c; }
        .batch-btn-group { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .detail-row { margin-bottom: 0.8rem; padding-bottom: 0.8rem; border-bottom: 1px solid #edf2f7; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 小班课物料需求管理系统（云端版）</h1>
        <div class="sub">团队实时共享 · 数据永久保存</div>
    </div>
    <div class="stats-grid" id="statsGrid"></div>

    <div class="analysis-card">
        <h3>📊 工作量图表分析看板</h3>
        <div class="analysis-tab-bar">
            <div class="analysis-tab active" data-type="all">全部需求</div>
            <div class="analysis-tab" data-type="done">仅已完成</div>
            <div class="analysis-tab" data-type="pending">进行中/待处理</div>
        </div>
        <div class="chart-grid">
            <div class="chart-box"><h4>各课程级别需求数量</h4><canvas id="barChart" width="400" height="280"></canvas></div>
            <div class="chart-box"><h4>物料类型占比分布</h4><canvas id="pieChart" width="400" height="280"></canvas></div>
            <div class="chart-box"><h4>月度工作量统计</h4><canvas id="monthChart" width="400" height="280"></canvas></div>
        </div>
        <div class="analysis-summary" id="analysisSummary"></div>
    </div>

    <div class="two-col">
        <div class="card">
            <h3>✍️ 新增需求 / 批量导入</h3>
            <div class="form-group"><label>课程级别</label><select id="courseSeries"><option value="PU1">PU1 (YLE1)</option><option value="PU2">PU2 (YLE2)</option><option value="PU3">PU3 (YLE3)</option><option value="KET">KET</option><option value="PET">PET</option><option value="FCE">FCE</option></select></div>
            <div class="form-group"><label>物料类型</label><select id="materialType"><option value="课件">课件修改</option><option value="学习手册">学习手册内容</option><option value="真题添加">真题内容添加</option><option value="海报/视频">海报/宣传视频</option><option value="小程序替换">小程序文件替换</option></select></div>
            <div class="form-group"><label>课标编号</label><input type="text" id="taskCode" placeholder="例：YLE1-L1-U9-LC1-1"></div>
            <div class="form-group"><label>需求内容描述</label><textarea id="taskDesc" rows="3" placeholder="例：将课件模考说明"></textarea><button class="clear-input-btn" id="clearInputBtn">清空输入框</button></div>
            <div class="form-group"><label>提需人</label><input type="text" id="taskPerson" placeholder="例：心静"></div>
            <div class="form-group"><label>提需日期</label><input type="date" id="taskDate"></div>
            <div class="form-group"><label>期望完成时间</label><input type="date" id="taskExpectDate"></div>
            <div class="form-group"><label>上传截图/配图</label><input type="file" id="imgUpload" accept="image/*"><img id="imgPreview" class="img-preview"></div>
            <button id="genTicketBtn">⚡ 自动生成标准化描述</button>
            <div id="previewTicket" class="preview-block"></div>
            <button id="addTaskBtn" class="add-task-btn">➕ 添加需求至看板</button>
            <button id="exportReportBtn" class="export-btn">📄 导出全量周报</button>
            <div class="form-group"><label>批量导入模式</label><select id="importMode"><option value="append">追加（仅新增不重复）</option><option value="replace">覆盖重复项</option></select><div class="mode-tip" style="font-size:0.75rem;color:#64748b;">重复规则：课标+课程+类型+描述</div></div>
            <div class="batch-btn-group">
                <button id="openImportModal">📥 文本批量导入</button>
                <button id="exportCSVBtn">💾 全量CSV备份</button>
            </div>
            <div class="form-group" style="margin-top:0.5rem;"><label>上传CSV文件</label><input type="file" id="fileUpload" accept=".csv"><button id="uploadFile" style="margin-top:0.5rem;">📤 解析导入</button></div>
        </div>

        <div class="card">
            <h3>📋 全部物料需求台账</h3>
            <div class="filter-bar">
                <input class="filter-input-key" type="text" id="searchInput" placeholder="关键词搜索">
                <input class="filter-input-date" type="date" id="dateStart"> <span>至</span> <input class="filter-input-date" type="date" id="dateEnd">
                <select id="filterCourse"><option value="all">全部课程</option><option value="PU1">PU1</option><option value="PU2">PU2</option><option value="PU3">PU3</option><option value="KET">KET</option><option value="PET">PET</option><option value="FCE">FCE</option></select>
                <select id="filterType"><option value="all">全部物料</option><option value="课件">课件</option><option value="学习手册">学习手册</option><option value="真题添加">真题添加</option><option value="海报/视频">海报/视频</option><option value="小程序替换">小程序</option></select>
                <select id="filterStatus"><option value="all">全部状态</option><option value="待处理">待处理</option><option value="进行中">进行中</option><option value="已完成">已完成</option></select>
                <select id="filterPerson"><option value="all">全部提需人</option></select>
                <button id="filterBtn">筛选</button><button id="resetFilterBtn">重置</button><button id="exportFilterBtn">导出表格</button>
            </div>
            <div id="taskListContainer">加载中...</div>
            <div class="footer-note">💡 数据实时云端同步，所有人可见可编辑</div>
        </div>
    </div>
</div>

<!-- 弹窗 -->
<div class="modal-mask" id="detailModal"><div class="modal-box"><div class="modal-title">📋 需求详情</div><input type="hidden" id="detailTaskId"><div id="detailContent"></div><div class="modal-buttons" style="display:flex; gap:0.8rem; margin-top:1rem;"><button id="openEditFromDetailBtn">编辑</button><button class="cancel-btn" id="closeDetailModal">关闭</button></div></div></div>
<div class="modal-mask" id="editModal"><div class="modal-box"><div class="modal-title">✏️ 编辑需求</div><input type="hidden" id="editTaskId"><div id="editForm"></div><div class="modal-buttons"><button id="saveEditBtn">保存</button><button class="cancel-btn" id="closeEditModal">取消</button></div></div></div>
<div class="modal-mask" id="importModal"><div class="modal-box"><div class="modal-title">📥 批量文本导入</div><textarea id="importTextarea" rows="12" placeholder="格式：序号,课标,级别,类别,内容,提需人,提需日期,期望时间,状态"></textarea><div class="modal-buttons"><button id="confirmImportBtn">确认导入</button><button class="cancel-btn" id="closeImportModal">取消</button></div></div></div>

<script>
// ========== 1. 请替换为你的 Supabase 配置 ==========
const supabaseUrl = 'https://xpeqyevrmybxqgfcsher.supabase.co/rest/v1/';      
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwZXF5ZXZybXlieHFnZmNzaGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTU2MzAsImV4cCI6MjA5Njk5MTYzMH0.19tdRzEnocY5vrdDr2qv7qxy2QwIa67QUNrBFkOCQOk'; //
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// 全局变量
let tasks = [];
let analysisFilterType = 'all';
let searchKey = '', filterDateStart = '', filterDateEnd = '';
let tempBase64Img = '', editTempImg = '';
const today = new Date().toISOString().split('T')[0];
const allMaterialTypes = ["课件","学习手册","真题添加","海报/视频","小程序替换"];
const courseFullName = { PU1:"PU1 (YLE1)", PU2:"PU2 (YLE2)", PU3:"PU3 (YLE3)", KET:"KET", PET:"PET", FCE:"FCE" };
const typeSuffix = { "课件":"；课件修改完成并挂载","学习手册":"；手册修改并归档","真题添加":"；真题内容补充完成","海报/视频":"；物料审核上传","小程序替换":"；小程序文件替换完成" };

// 从云端加载数据
async function loadTasks() {
    const { data, error } = await supabase.from('tasks').select('*').order('id', { ascending: false });
    if (error) {
        console.error(error);
        alert('加载数据失败，请检查 Supabase 配置或网络');
        tasks = [];
    } else {
        tasks = data || [];
    }
    refreshAll();
}

// 增删改操作
async function addTaskToCloud(task) {
    const { data, error } = await supabase.from('tasks').insert([task]).select();
    if (error) { alert('添加失败：'+error.message); return null; }
    return data[0];
}
async function updateTaskInCloud(id, updates) {
    const { error } = await supabase.from('tasks').update(updates).eq('id', id);
    if (error) alert('更新失败：'+error.message);
}
async function deleteTaskFromCloud(id) {
    const { error } = await supabase.from('tasks').delete().eq('id', id);
    if (error) alert('删除失败：'+error.message);
}

// 辅助函数
function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function getUniqueKey(item) { return `${item.code}|${item.course}|${item.type}|${item.description}`; }

// 筛选
function getFilteredTasks() {
    let list = [...tasks];
    if(filterDateStart || filterDateEnd) {
        list = list.filter(t => { if(!t.date) return false; const d = new Date(t.date); if(filterDateStart && d<new Date(filterDateStart)) return false; if(filterDateEnd && d>new Date(filterDateEnd)) return false; return true; });
    }
    if(searchKey.trim()) {
        const key = searchKey.toLowerCase();
        list = list.filter(t => t.code?.toLowerCase().includes(key) || t.description.toLowerCase().includes(key) || t.person?.toLowerCase().includes(key));
    }
    const fc = document.getElementById('filterCourse').value;
    const ft = document.getElementById('filterType').value;
    const fs = document.getElementById('filterStatus').value;
    const fp = document.getElementById('filterPerson').value;
    list = list.filter(t => (fc==='all' || t.course===fc) && (ft==='all' || t.type===ft) && (fs==='all' || t.status===fs) && (fp==='all' || t.person===fp));
    return list;
}

function updateStats() {
    const total = tasks.length;
    const doneCount = tasks.filter(t=>t.status==='已完成').length;
    const pending = tasks.filter(t=>t.status!=='已完成').length;
    const rate = total===0?0:Math.round(doneCount/total*100);
    const overdue = tasks.filter(t=>t.status!=='已完成' && t.expectDate && new Date(t.expectDate)<new Date(today)).length;
    document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">总需求</div></div>
    <div class="stat-card"><div class="stat-number">${doneCount}</div><div class="stat-label">已完成 ✅</div></div>
    <div class="stat-card"><div class="stat-number">${pending}</div><div class="stat-label">待处理 ⏳</div></div>
    <div class="stat-card"><div class="stat-number">${rate}%</div><div class="stat-label">完成率</div></div>
    <div class="stat-card overdue"><div class="stat-number">${overdue}</div><div class="stat-label">逾期 ⚠️</div></div>`;
}

function renderTasks() {
    const list = getFilteredTasks();
    const container = document.getElementById('taskListContainer');
    if(!list.length) { container.innerHTML = '<div style="padding:2rem;text-align:center;">暂无数据</div>'; return; }
    let html = '';
    list.forEach(t => {
        const isOverdue = t.status!=='已完成' && t.expectDate && new Date(t.expectDate)<new Date(today);
        html += `<div class="task-item ${isOverdue?'overdue':''}" data-id="${t.id}">
            <div class="task-info"><div class="task-title">${escapeHtml(t.description)}</div>
            <div class="task-meta"><span class="task-category">${t.course} · ${t.type}</span><span class="task-person">提需人：${escapeHtml(t.person||'')}</span><span class="task-date">${t.date||''}</span>${t.img?' 📷':''}</div></div>
            <div class="task-status"><button class="status-btn ${t.status==='已完成'?'done':''}" data-id="${t.id}">${t.status}</button>
            <button class="status-btn detail-btn" data-did="${t.id}">详情</button>
            <button class="status-btn edit-btn" data-eid="${t.id}">编辑</button>
            <button class="status-btn del-btn" data-delid="${t.id}">删除</button></div></div>`;
    });
    container.innerHTML = html;
    // 绑定事件
    document.querySelectorAll('.status-btn:not(.detail-btn):not(.edit-btn):not(.del-btn)').forEach(btn => btn.onclick = async (e) => { e.stopPropagation(); const id=Number(e.target.dataset.id); const t=tasks.find(x=>x.id===id); if(!t) return; const arr=["待处理","进行中","已完成"]; const idx=arr.indexOf(t.status); const newStatus=arr[(idx+1)%3]; await updateTaskInCloud(id,{status:newStatus}); await loadTasks(); });
    document.querySelectorAll('.del-btn').forEach(btn => btn.onclick = async (e) => { e.stopPropagation(); if(confirm('删除？')){ await deleteTaskFromCloud(Number(e.target.dataset.delid)); await loadTasks(); } });
    document.querySelectorAll('.detail-btn').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); openDetail(Number(e.target.dataset.did)); });
    document.querySelectorAll('.edit-btn').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); openEdit(Number(e.target.dataset.eid)); });
    document.querySelectorAll('.task-item').forEach(item => item.onclick = () => openDetail(Number(item.dataset.id)));
}

function openDetail(id) {
    const t = tasks.find(x=>x.id===id);
    if(!t) return;
    document.getElementById('detailTaskId').value = t.id;
    let html = `<div class="detail-row"><strong>课标：</strong> ${t.code||'无'}</div>
    <div class="detail-row"><strong>级别：</strong> ${courseFullName[t.course]}</div>
    <div class="detail-row"><strong>类型：</strong> ${t.type}</div>
    <div class="detail-row"><strong>内容：</strong> ${escapeHtml(t.description)}</div>
    <div class="detail-row"><strong>提需人：</strong> ${t.person||'匿名'}</div>
    <div class="detail-row"><strong>提需日期：</strong> ${t.date||'无'}</div>
    <div class="detail-row"><strong>期望完成：</strong> ${t.expectDate||'无'}</div>
    <div class="detail-row"><strong>状态：</strong> ${t.status}</div>
    <div class="detail-row"><strong>配图：</strong> ${t.img ? `<img src="${t.img}" style="max-width:100%;max-height:200px;">` : '无'}</div>`;
    document.getElementById('detailContent').innerHTML = html;
    document.getElementById('detailModal').style.display = 'flex';
}
function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }

function openEdit(id) {
    const t = tasks.find(x=>x.id===id);
    if(!t) return;
    document.getElementById('editTaskId').value = t.id;
    editTempImg = t.img||'';
    let html = `<div class="form-group"><label>级别</label><select id="editCourse">${['PU1','PU2','PU3','KET','PET','FCE'].map(c=>`<option value="${c}" ${t.course===c?'selected':''}>${courseFullName[c]}</option>`).join('')}</select></div>
    <div class="form-group"><label>类型</label><select id="editType">${allMaterialTypes.map(ty=>`<option value="${ty}" ${t.type===ty?'selected':''}>${ty}</option>`).join('')}</select></div>
    <div class="form-group"><label>课标</label><input type="text" id="editCode" value="${escapeHtml(t.code||'')}"></div>
    <div class="form-group"><label>内容</label><textarea id="editDesc" rows="3">${escapeHtml(t.description)}</textarea></div>
    <div class="form-group"><label>提需人</label><input type="text" id="editPerson" value="${escapeHtml(t.person||'')}"></div>
    <div class="form-group"><label>提需日期</label><input type="date" id="editDate" value="${t.date||''}"></div>
    <div class="form-group"><label>期望完成</label><input type="date" id="editExpectDate" value="${t.expectDate||''}"></div>
    <div class="form-group"><label>状态</label><select id="editStatus"><option value="待处理" ${t.status==='待处理'?'selected':''}>待处理</option><option value="进行中" ${t.status==='进行中'?'selected':''}>进行中</option><option value="已完成" ${t.status==='已完成'?'selected':''}>已完成</option></select></div>
    <div class="form-group"><label>更换配图</label><input type="file" id="editImgUpload" accept="image/*"><img id="editImgPreview" class="img-preview" style="${t.img?'display:block':'display:none'}" src="${t.img||''}"></div>`;
    document.getElementById('editForm').innerHTML = html;
    document.getElementById('editModal').style.display = 'flex';
    // 图片预览
    document.getElementById('editImgUpload')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = ev => { editTempImg = ev.target.result; document.getElementById('editImgPreview').src = editTempImg; document.getElementById('editImgPreview').style.display = 'block'; };
            reader.readAsDataURL(file);
        }
    });
}
function closeEdit() { document.getElementById('editModal').style.display = 'none'; editTempImg = ''; }
async function saveEdit() {

// 新增需求
async function addNewTask() {
    const course = document.getElementById('courseSeries').value;
    const type = document.getElementById('materialType').value;
    const code = document.getElementById('taskCode').value.trim();
    const description = document.getElementById('taskDesc').value.trim();
    if(!description) return alert('请填写需求内容');
    const person = document.getElementById('taskPerson').value.trim();
    const date = document.getElementById('taskDate').value;
    const expectDate = document.getElementById('taskExpectDate').value;
    const newTask = { code, course, type, description, person, date, expectDate, status:'待处理', img: tempBase64Img };
    const { error } = await supabase.from('tasks').insert([newTask]);
    if(error) alert('添加失败：'+error.message);
    else {
        tempBase64Img = '';
        document.getElementById('imgUpload').value = '';
        document.getElementById('imgPreview').style.display = 'none';
        await loadTasks();
        alert('添加成功');
    }
}

// 图片预览
document.getElementById('imgUpload').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = ev => { tempBase64Img = ev.target.result; document.getElementById('imgPreview').src = tempBase64Img; document.getElementById('imgPreview').style.display = 'block'; };
        reader.readAsDataURL(file);
    }
});

// 批量导入逻辑
async function handleImportData(importList, mode) {
    const existKeys = new Set(tasks.map(getUniqueKey));
    let newItems = [];
    let repeat = 0;
    for(let item of importList) {
        const key = getUniqueKey(item);
        if(mode==='append' && existKeys.has(key)) { repeat++; continue; }
        newItems.push({ code:item.code, course:item.course, type:item.type, description:item.description, person:item.person, date:item.date, expectDate:item.expectDate, status:item.status||'待处理', img:'' });
    }
    if(newItems.length) {
        const { error } = await supabase.from('tasks').insert(newItems);
        if(error) alert('批量导入失败：'+error.message);
        else await loadTasks();
    }
    alert(`导入完成：新增 ${newItems.length} 条，重复过滤 ${repeat} 条`);
}
function openImportModal() { document.getElementById('importTextarea').value = ''; document.getElementById('importModal').style.display = 'flex'; }
function closeImportModal() { document.getElementById('importModal').style.display = 'none'; }
async function batchImport() {
    const text = document.getElementById('importTextarea').value;
    const lines = text.split('\n').filter(l=>l.trim());
    const importList = [];
    for(let line of lines) {
        const arr = line.split(',').map(s=>s.trim());
        if(arr.length<5) continue;
        const [_, code, course, type, description, person, date, expect, status] = arr;
        if(!courseFullName[course] || !allMaterialTypes.includes(type)) continue;
        importList.push({ code, course, type, description, person:person||'匿名', date:date||'', expectDate:expect||'', status: (status==='已完成'||status==='进行中'||status==='待处理')?status:'待处理' });
    }
    const mode = document.getElementById('importMode').value;
    await handleImportData(importList, mode);
    closeImportModal();
}
async function uploadCSV() {
    const file = document.getElementById('fileUpload').files[0];
    if(!file) return alert('请选择CSV文件');
    const reader = new FileReader();
    reader.onload = async (e) => {
        const content = e.target.result;
        const lines = content.split('\n').filter(l=>l.trim());
        const importList = [];
        for(let i=1;i<lines.length;i++) {
            const arr = lines[i].split(',').map(s=>s.trim().replace(/"/g,''));
            if(arr.length<5) continue;
            const [_, code, course, type, description, person, date, expect, status] = arr;
            if(!courseFullName[course] || !allMaterialTypes.includes(type)) continue;
            importList.push({ code, course, type, description, person:person||'匿名', date:date||'', expectDate:expect||'', status: (status==='已完成'||status==='进行中'||status==='待处理')?status:'待处理' });
        }
        const mode = document.getElementById('importMode').value;
        await handleImportData(importList, mode);
        alert('CSV导入完成');
    };
    reader.readAsText(file, 'UTF-8');
}

function exportFilterData() { alert('导出功能请使用全量CSV备份'); }
function exportWeekReport() {
    const done = tasks.filter(t=>t.status==='已完成');
    const pending = tasks.filter(t=>t.status!=='已完成');
    let txt = '===== 小班课物料修改周报 =====\n【已完成】\n';
    done.forEach(t=>txt += `· ${t.description}（${t.course} ${t.type}，${t.person}）\n`);
    txt += '\n【待处理/进行中】\n';
    pending.forEach(t=>txt += `· ${t.description}（${t.course} ${t.person}，状态：${t.status}）\n`);
    navigator.clipboard.writeText(txt).then(()=>alert('周报已复制')).catch(()=>console.log(txt));
}
function exportCSV() {
    let csv = 'id,课标,级别,类别,内容,提需人,提需日期,期望时间,状态,含图片\n';
    tasks.forEach(t => {
        csv += `${t.id},"${t.code||''}","${t.course}","${t.type}","${t.description}","${t.person||''}","${t.date||''}","${t.expectDate||''}","${t.status}","${t.img?'是':'否'}\n`;
    });
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `物料需求全量备份_${new Date().toISOString().slice(0,19)}.csv`;
    a.click();
}
